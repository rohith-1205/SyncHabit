name: synchabit
description: A futuristic AI-powered behavioral operating system focused on habits, deep work, burnout prevention, and AI productivity optimization.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # UI & Styling & Animations
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  shimmer: ^3.0.0

  # Storage & Utilities
  shared_preferences: ^2.3.2
  uuid: ^4.5.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
