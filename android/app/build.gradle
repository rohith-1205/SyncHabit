plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace = "com.synchabit.synchabit"
    compileSdk = 34
    ndkVersion = "25.1.8937393"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    packagingOptions {
        jniLibs {
            pickFirsts.add("lib/**/libisar.so")
            useLegacyPackaging = true
        }
    }

    flavorDimensions "env"

    productFlavors {
        development {
            dimension "env"
            applicationId "com.synchabit.dev"
            resValue "string", "app_name", "SyncHabit Dev"
        }
        staging {
            dimension "env"
            applicationId "com.synchabit.stage"
            resValue "string", "app_name", "SyncHabit Stage"
        }
        production {
            dimension "env"
            applicationId "com.synchabit.app"
            resValue "string", "app_name", "SyncHabit"
        }
    }

    defaultConfig {
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
